<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #141414;
            color: white;
            text-align: center;
        }

        h2 {
            color: #e50914;
            margin-top: 20px;
        }

        .container {
            margin-top: 30px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 5px;
        }

        button:hover {
            background-color: #b20710;
        }

        /* ⭐ GRID LAYOUT LIKE NETFLIX */
        .movies {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: auto;
        }

        /* ⭐ CARD DESIGN */
        .card {
            background-color: #1f1f1f;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
        }

        /* ⭐ IMAGE FIX (same size) */
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .card p {
            margin: 10px;
            font-size: 14px;
            color: #ddd;
        }
    </style>
</head>

<body>

<h2>🎬 Movie Recommender</h2>

<div class="container">
    <form action="/recommend" method="post">
        <input type="text" name="movie" placeholder="Enter movie name">
        <button type="submit">Recommend</button>
    </form>
</div>

<h3>Recommended Movies</h3>

<div class="movies">

{% for i in range(movies|length) %}
    <div class="card">
        <img src="{{ posters[i] }}" alt="poster">
        <p>{{ movies[i] }}</p>
    </div>
{% endfor %}

</div>

</body>
</html>
